<cdk-virtual-scroll-viewport
  itemSize="100vh"
  class="viewport"
  (scrolledIndexChange)="onScrollIndexChange($event)">

  <div *cdkVirtualFor="let task of tasks" class="task-container">

    <!-- Бекграунд, который видно при свайпе (Подложка) -->
    <div class="swipe-background">
      <div class="skip-bg" [style.opacity]="task.swipeOffset > 0 ? 1 : 0">
        <span>Пропустить ⏭</span>
      </div>
      <div class="confirm-bg" [style.opacity]="task.swipeOffset < 0 ? 1 : 0">
        <span>Подтвердить ✅</span>
      </div>
    </div>

    <!-- Основная карточка задачи -->
    <div class="task-card"
         [class.swiping]="task.isSwiping"
         [class.answered]="task.status !== 'pending'"
         [style.transform]="'translateX(' + task.swipeOffset + 'px)'"
         (touchstart)="onTouchStart($event, task)"
         (touchmove)="onTouchMove($event, task)"
         (touchend)="onTouchEnd(task)">

      <div class="task-header">
        <h2>{{ task.description }}</h2>
      </div>

      <div class="options-list">
        <button *ngFor="let option of task.options"
                class="option-btn"
                [class.selected]="task.selectedOption === option"
                (click)="selectOption(task, option)">
          {{ option }}
        </button>
      </div>

      <div class="swipe-hint" *ngIf="task.selectedOption && task.status === 'pending'">
        <p>Свайп влево — подтвердить<br>Свайп вправо — пропустить</p>
      </div>

    </div>
  </div>

</cdk-virtual-scroll-viewport>
